server {
    listen 80;
    server_name beach-stars.ru www.beach-stars.ru;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name beach-stars.ru www.beach-stars.ru;

    # Пути к сертификатам (внутри контейнера)
    ssl_certificate /etc/letsencrypt/live/beach-stars.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/beach-stars.ru/privkey.pem;

    # Настройки безопасности SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https; # Важно: сообщаем Django, что это https
    }

    location /static/ {
        alias /app/staticfiles/;
    }
}